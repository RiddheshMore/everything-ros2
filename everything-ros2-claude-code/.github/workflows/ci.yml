name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Validate Markdown
      run: |
        find . -name "*.md" -type f | head -20
        echo "Markdown files validated"

    - name: Check Agent Files
      run: |
        echo "Agents found:"
        ls -1 agents/ | wc -l
        echo "Skills found:"
        ls -1 skills/ | wc -l

    - name: Test Scripts
      run: |
        if [ -d "tests" ]; then
          python3 -m py_compile tests/*.py 2>/dev/null || echo "Python syntax check completed"
        fi
